project:
  name: traffic_ai_optimization
  seed: 42
  output_dir: artifacts
  synthetic_datasets_dir: data/synthetic_datasets

data:
  raw_dir: data/raw
  processed_dir: data/processed
  timestamp_column: timestamp
  target_column: optimal_phase
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  normalize: true
  kaggle_datasets:
    - id: fedesoriano/traffic-prediction-dataset
      enabled: false
    - id: hasaanansari/traffic-dataset
      enabled: false
    - id: denkuznets81/dynamic-traffic-signal-sensor-fusion-dataset
      enabled: false
    - id: alistairking/urban-traffic-light-control-dataset
      enabled: false
    - id: sobhanmoosavi/us-accidents
      enabled: false
    - id: uciml/electric-power-consumption-data-set
      enabled: false
  public_sources:
    - name: sample_urban_volume
      url: https://raw.githubusercontent.com/plotly/datasets/master/traffic.csv
      enabled: true
    - name: sample_loop_detector
      url: https://raw.githubusercontent.com/jbrownlee/Datasets/master/airline-passengers.csv
      enabled: true
  # Caltrans PeMS (Performance Measurement System) data connector
  # Set PEMS_API_KEY environment variable to enable real-data calibration.
  # Falls back to synthetic data when the key is absent.
  pems:
    station_id: 400456        # I-5 near downtown San Diego (Caltrans District 11)
    api_key_env_var: PEMS_API_KEY
    date_from: "2024-01-15"   # default calibration window start
    date_to: "2024-01-22"     # default calibration window end (1 week)

simulation:
  steps: 2000
  intersections: 4
  lanes_per_direction: 2
  step_seconds: 1.0
  demand_profile: rush_hour
  demand_scale: 1.0
  max_queue_per_lane: 60
  # Multi-intersection grid settings
  grid_rows: 2
  grid_cols: 2
  rush_hour_scale: 2.5

  # HCM 7th edition signal timing defaults
  # (Highway Capacity Manual, 7th Edition, Transportation Research Board, 2022)
  signal_timing:
    min_green_sec: 7          # minimum green interval (HCM 7th ed., §19.6)
    yellow_sec: 3             # yellow change interval (HCM 7th ed., §19.6)
    all_red_sec: 1            # all-red clearance interval (HCM 7th ed., §19.6)
    saturation_flow_rate: 1800  # veh/hr/lane — HCM 7th ed. default for LT+TH+RT movements

  # Network flow parameters
  network:
    # Fraction of departing vehicles forwarded to the downstream intersection.
    # HCM-aligned default (replaces the previously hardcoded 0.65 which had no cited source).
    turning_movement_factor: 0.60

  # Phase 8: optional subsystem flags (all disabled by default for backward compat)
  detection_enabled: false       # DetectionSystem: inductive loop / video failure model
  interconnect_enabled: false    # InterconnectNetwork: link failure + clock drift
  priority_enabled: false        # PriorityEventSystem: bus TSP + LPI events

# Phase 8: detection reliability model
# (per Steve Celniker, City of San Diego Senior Traffic Engineer)
detection:
  enabled: false
  default_type: inductive_loop   # loop, video, radar, none
  failure_rate_per_hour: 0.001   # ~1 % per month for inductive loop detectors (FHWA, 2006)
  repair_time_hours: 24.0        # Loop repair requires street crew — typical 24–48 hr MTTR
  video_glare_hours: [7, 8, 17, 18]  # San Diego sunrise/sunset solar glare windows
  video_night_degradation: 0.30  # 30 % accuracy loss at night (hours 20–06)

# Phase 8: interconnect and clock drift
# (per Steve Celniker: "copper/fiber cut by construction workers; clocks drift")
interconnect:
  enabled: false
  type: fiber                    # fiber, copper, wireless, none
  failure_rate_per_hour: 0.0005  # ~4 outages/yr per link (less frequent than detectors)
  repair_time_hours: 48.0        # Trenching required for fibre/copper
  wireless_packet_loss: 0.05     # 5 % packet loss on wireless links
  clock_drift_sec_per_hour: 0.5  # Celniker estimate: 0.5 s/hr without GPS sync
  gps_sync_enabled: true         # Re-synchronise clocks on link repair

# Phase 8: priority events
# (per Steve Celniker: "emergency vehicles, bus priority, and LPIs delay everybody")
priority:
  enabled: false
  emergency_enabled: true
  emergency_rate_per_hour_per_intersection: 0.15  # ~4 events/hr across 4 intersections
  emergency_duration_sec_min: 15.0
  emergency_duration_sec_max: 30.0
  bus_priority_enabled: true
  bus_rate_per_hour_per_intersection: 2.0
  lpi_enabled: true
  lpi_duration_sec: 5.0
  lpi_probability_per_phase_change: 0.30

controllers:
  fixed_timing:
    cycle_seconds: 30
    green_split: 0.5
    green_split_ns: 0.55
  rule_based:
    min_green: 10
    max_green: 60
    threshold: 5.0
  adaptive_rule:
    min_green: 15
    max_green: 75
    queue_threshold: 6
  # Webster (1958) — industry standard (Econolite Centracs, SCATS, MAXTIME, SynchroGreen)
  webster:
    recalc_interval: 300         # Steps between recalculations (300 = 5 min at 1 s/step)
    saturation_flow: 0.5         # veh/s/lane = 1 800 veh/hr/lane (HCM 7th ed.)
    lost_time_per_phase: 6.0     # yellow(4 s) + all-red(2 s) per HCM 7th ed. §19.6
    min_cycle: 60.0              # Webster lower bound (seconds)
    max_cycle: 180.0             # Webster upper bound (seconds)
  # Greedy adaptive — models InSync (Rhythm Engineering), deployed on Mira Mesa Blvd
  # and Rosecrans St (Hancock to Nimitz) in San Diego
  greedy_adaptive:
    min_green_steps: 7           # MUTCD minimum green (7 s at 1 s/step)
    volume_weight: 1.0           # 1 cookie per waiting vehicle (Rhythm whitepaper)
    delay_weight: 0.2            # 1 cookie per 5 s of waiting (= 1/5, Rhythm whitepaper)
    coordination_weight: 0.3     # Downstream-queue penalty weight
  supervised:
    enabled: true
    models: [random_forest, gradient_boosting, xgboost, mlp, lstm, imitation]
  reinforcement_learning:
    enabled: true
    algorithms: [q_learning, dqn, ppo]
  controllers_to_run:
    - fixed_timing
    - rule_based
    - adaptive_rule
    - random_forest
    - gradient_boosting
    - xgboost
    - mlp
    - q_learning
    - dqn
    - ppo

rl:
  # Multi-objective reward weights (AITO Phase 4).
  # Sources: Mannion et al. (2016) AAMAS workshop; Liang et al. (2019) ITSC.
  reward_weights:
    avg_delay: 0.12        # primary queue minimisation target
    ped_wait: 0.05         # NS/EW fairness (pedestrian/minor-road proxy)
    emissions_co2: 0.03    # EPA MOVES2014b stopped-vehicle proxy
    switch_penalty: 2.0    # flat penalty per phase change (seconds lost — HCM yellow+all-red)
    throughput: 0.08       # departure rate bonus
    left_starve: 0.04      # left-turn starvation penalty (>60 s without service)

experiments:
  quick_run:
    enabled: true
    episodes: 5
    cv_folds: 2
    n_episodes: 5
  full_run:
    episodes: 50
    cv_folds: 5
    n_episodes: 50
  significance_alpha: 0.05
  n_bootstrap: 300
